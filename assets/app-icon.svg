<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16c4b6"/>
      <stop offset="1" stop-color="#0a8f9c"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7f4f3"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="3" y="3" width="58" height="58" rx="14" fill="url(#tile)"/>
  <rect x="3" y="3" width="58" height="58" rx="14" fill="#ffffff" opacity="0.06"/>

  <!-- graduation cap -->
  <!-- head band / cap base -->
  <path d="M21 28.5 v7.2 c0 3.4 4.9 5.6 11 5.6 s11-2.2 11-5.6 v-7.2 L32 34 Z"
        fill="#cdeeeb"/>
  <!-- mortarboard (diamond) -->
  <path d="M32 17 L53 27 L32 37 L11 27 Z" fill="url(#board)"
        stroke="#0a8f9c" stroke-width="0.6"/>
  <!-- centre button -->
  <circle cx="32" cy="27" r="2.1" fill="#f6b51e"/>
  <!-- tassel cord draping left, with bead -->
  <path d="M32 27 C 24 30, 20 33, 20 39" fill="none"
        stroke="#f6b51e" stroke-width="2.1" stroke-linecap="round"/>
  <circle cx="20" cy="40.4" r="2.7" fill="#f6b51e"/>
  <rect x="18.4" y="41.6" width="3.2" height="4.2" rx="1.4" fill="#f6b51e"/>

  <!-- pass check badge (bottom-right) -->
  <circle cx="46" cy="46.5" r="10" fill="#21c45d" stroke="#ffffff" stroke-width="2.6"/>
  <path d="M41.3 46.6 l3.1 3.2 l6.2 -6.9" fill="none" stroke="#ffffff"
        stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
